spring.application.name=backflowpath
gg.jte.development-mode=${GG_JTE_DEVELOPMENT_MODE:false}
gg.jte.use-precompiled-templates=${GG_JTE_USE_PRECOMPILED_TEMPLATES:true}

app.data.root=${APP_DATA_ROOT:./data}
app.site.base-url=${APP_SITE_BASE_URL:https://backflowpath.com}
app.site.site-name=${APP_SITE_NAME:BackflowPath}
app.site.ga-measurement-id=${APP_SITE_GA_MEASUREMENT_ID:}
app.site.support-email=${APP_SITE_SUPPORT_EMAIL:shinhyeok22@gmail.com}
app.site.support-phone=${APP_SITE_SUPPORT_PHONE:}
app.leads.root=${APP_LEADS_ROOT:./storage/leads}
app.leads.submission-rate-limit-window-seconds=${APP_LEADS_SUBMISSION_RATE_LIMIT_WINDOW_SECONDS:600}
app.leads.submission-rate-limit-max-attempts=${APP_LEADS_SUBMISSION_RATE_LIMIT_MAX_ATTEMPTS:3}
app.admin.username=${APP_ADMIN_USERNAME:}
app.admin.password=${APP_ADMIN_PASSWORD:}
app.delivery.email-enabled=${APP_DELIVERY_EMAIL_ENABLED:false}
app.delivery.from-email=${APP_DELIVERY_FROM_EMAIL:}
app.delivery.from-name=${APP_DELIVERY_FROM_NAME:BackflowPath}
app.delivery.reply-to=${APP_DELIVERY_REPLY_TO:}
app.ops.freshness-report-path=${APP_OPS_FRESHNESS_REPORT_PATH:./build/ops/freshness_report.json}
app.ops.freshness-audit-cron=0 15 3 * * *
app.ops.write-freshness-report-on-startup=true
app.ops.verification-report-path=${APP_OPS_VERIFICATION_REPORT_PATH:./build/ops/verification_report.json}
app.ops.allow-local-requests=${APP_OPS_ALLOW_LOCAL_REQUESTS:false}
app.ops.verification-token=${APP_OPS_VERIFICATION_TOKEN:}

server.forward-headers-strategy=framework
server.compression.enabled=true
server.compression.mime-types=text/html,text/css,application/javascript,application/json,image/svg+xml
server.compression.min-response-size=1024
spring.web.resources.cache.cachecontrol.max-age=365d
