server {
    listen 80;
    listen [::]:80;
    server_name backflowpath.com www.backflowpath.com;

    return 301 https://backflowpath.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name backflowpath.com www.backflowpath.com;

    # Replace these with your actual certificate paths or Cloudflare origin cert paths.
    ssl_certificate /etc/ssl/backflowpath/fullchain.pem;
    ssl_certificate_key /etc/ssl/backflowpath/privkey.pem;

    client_max_body_size 10m;

    # Keep private ops routes off the public internet even if the app is listening behind nginx.
    location ^~ /ops/ {
        return 404;
    }

    # Keep health checks host-local.
    location = /healthz {
        allow 127.0.0.1;
        allow ::1;
        deny all;

        proxy_pass http://127.0.0.1:8093;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location / {
        proxy_pass http://127.0.0.1:8093;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;
    }
}
